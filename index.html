<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kittyzayka | Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    color: white;
}

/* ОСНОВНОЙ КОСМИЧЕСКИЙ ФОН */
body {
    background:
        radial-gradient(circle at 25% 30%, rgba(0, 120, 255, 0.14), transparent 45%),
        radial-gradient(circle at 75% 70%, rgba(255, 0, 170, 0.14), transparent 45%),
        radial-gradient(circle at 50% 10%, rgba(0, 80, 255, 0.10), transparent 45%),
        linear-gradient(140deg, #000000, #000000, #01020a, #020012);
    background-size: 200% 200%;
    animation: spaceMove 25s infinite alternate ease-in-out;
}

@keyframes spaceMove {
    0% { background-position: 0% 0%; }
    50% { background-position: 50% 40%; }
    100% { background-position: 100% 60%; }
}

#particles-js {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
}

.main-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* КАРТОЧКА */
.card {
    backdrop-filter: blur(18px);
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    padding: 35px 45px;
    box-shadow: 0 0 40px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.05);
    text-align: center;
    max-width: 420px;
    width: 90%;
}

.avatar-wrapper {
    position: relative;
    display: inline-block;
}

.avatar {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 3px solid white;
    object-fit: cover;
    box-shadow: 0 0 30px rgba(0, 150, 255, 0.6), 0 0 50px rgba(255, 0, 150, 0.4);
}

.status-dot {
    position: absolute;
    bottom: 8px;
    right: 8px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 3px solid #111;
    background: #777;
}

h1 {
    font-size: 2.6rem;
    margin: 10px 0;
}

.divider {
    width: 60px;
    height: 3px;
    background: white;
    margin: 15px auto;
}

.small {
    opacity: 0.8;
    font-size: 0.85rem;
    margin: 5px 0;
}

.social-links {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 20px 0;
}

.social-links a {
    font-size: 1.6rem;
    color: white;
    transition: 0.3s;
}

.social-links a:hover {
    transform: translateY(-5px) scale(1.2);
    filter: drop-shadow(0 0 8px white);
}

/* СЕКЦИЯ ПРОЕКТОВ */
.projects-section {
    margin-top: 25px;
    padding-top: 20px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.projects-title {
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 15px;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.6;
}

.project-card {
    background: rgba(255, 255, 255, 0.03);
    border-radius: 15px;
    padding: 18px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    transition: 0.3s ease;
}

.project-card:hover {
    background: rgba(255, 255, 255, 0.07);
    border-color: rgba(0, 136, 204, 0.4);
}

.project-button {
    display: inline-flex;
    align-items: center;
    background: #0088cc;
    padding: 8px 22px;
    border-radius: 50px;
    text-decoration: none;
    color: white;
    font-weight: 600;
    font-size: 0.85rem;
    transition: 0.3s;
    margin-bottom: 12px;
    box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3);
}

.project-button i {
    margin-right: 8px;
}

.project-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 136, 204, 0.5);
}

.project-info {
    font-size: 0.78rem;
    line-height: 1.5;
    opacity: 0.8;
    text-align: center;
    margin: 0;
}

.project-info b {
    color: #00aaff;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<div class="main-container">
    <div class="card">
        <div class="avatar-wrapper">
            <img src="avatar.jpg" class="avatar">
            <div class="status-dot" id="statusDot"></div>
        </div>

        <h1>kittyzayka</h1>

        <div class="divider"></div>

        <div class="small" id="clock"></div>
        <div class="small">🎮 Favorite game: Resident Evil</div>
        <div class="small" id="visits"></div>

        <div class="social-links">
            <a href="https://t.me/KITTY_VOR" target="_blank"><i class="fab fa-telegram"></i></a>
            <a href="https://www.youtube.com/@kittyzayka" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://github.com/Kittechka" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://www.tiktok.com/@kittyyzaykaa" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://steamcommunity.com/id/kittyzayka/" target="_blank"><i class="fab fa-steam"></i></a>
        </div>

        <div class="projects-section">
            <div class="projects-title">Мои проекты</div>
            <div class="project-card">
                <a href="https://t.me/bb024ISP_bot" class="project-button" target="_blank">
                    <i class="fab fa-telegram"></i> Telegram Bot
                </a>
                <p class="project-info">
                    Разработка заняла около <b>6 часов</b>. Был реализован основной функционал и продуман <b>интерфейс через кнопки</b>, что делает использование максимально быстрым и понятным.
                </p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script>
/* Увеличено до 300 частиц для более богатого фона */
particlesJS("particles-js", {
    particles: {
        number: { value: 300, density: { enable: true, value_area: 800 } },
        color: { value: "#ffffff" },
        shape: { type: "circle" },
        opacity: { value: 0.6, random: true },
        size: { value: 2.5, random: true },
        line_linked: { enable: false },
        move: { enable: true, speed: 1.2, direction: "none", random: true, straight: false }
    },
    interactivity: {
        detect_on: "canvas",
        events: { onhover: { enable: false }, onclick: { enable: false } }
    },
    retina_detect: true
});

function updateClock() {
    let now = new Date();
    let utc = now.getTime() + now.getTimezoneOffset() * 60000;
    let novosibirsk = new Date(utc + 7 * 3600000);
    let h = String(novosibirsk.getHours()).padStart(2, "0");
    let m = String(novosibirsk.getMinutes()).padStart(2, "0");
    let s = String(novosibirsk.getSeconds()).padStart(2, "0");
    document.getElementById("clock").innerText = "Novosibirsk time: " + h + ":" + m + ":" + s;
}
setInterval(updateClock, 1000);
updateClock();

async function getDiscord() {
    try {
        let r = await fetch("https://api.lanyard.rest/v1/users/780407210270261318");
        let d = await r.json();
        let status = d.data.discord_status;
        let color = "#777";
        if (status === "online") color = "#43b581";
        if (status === "idle") color = "#faa61a";
        if (status === "dnd") color = "#f04747";
        document.getElementById("statusDot").style.background = color;
    } catch {}
}
setInterval(getDiscord, 15000);
getDiscord();
</script>

</body>
</html>
