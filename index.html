<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kittyzayka | Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    color: white;
}

/* 🔴 DARK RED THEME */
body {
    background:
        radial-gradient(circle at 20% 30%, rgba(255, 0, 60, 0.15), transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(120, 0, 0, 0.2), transparent 50%),
        linear-gradient(140deg, #050000, #0a0000, #120000);
    background-size: 200% 200%;
    animation: bgMove 20s infinite alternate ease-in-out;
}

@keyframes bgMove {
    0% { background-position: 0% 0%; }
    100% { background-position: 100% 100%; }
}

/* контейнер */
.main-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* карточка */
.card {
    backdrop-filter: blur(20px);
    background: rgba(255, 0, 0, 0.05);
    border-radius: 20px;
    padding: 35px;
    text-align: center;
    max-width: 420px;
    width: 90%;
    box-shadow: 0 0 40px rgba(255, 0, 0, 0.25);
}

/* аватар */
.avatar {
    width: 120px;
    border-radius: 50%;
    border: 3px solid #ff2a2a;
    box-shadow: 0 0 20px rgba(255,0,0,0.7);
}

/* язык */
.lang-switch {
    margin-top: 10px;
    font-size: 0.8rem;
    opacity: 0.7;
    cursor: pointer;
}
.lang-switch span:hover {
    color: #ff4d4d;
}

/* текст */
.small {
    font-size: 0.85rem;
    opacity: 0.85;
    margin: 6px 0;
}

/* проекты */
.projects-title {
    margin-top: 20px;
    font-size: 0.9rem;
    opacity: 0.6;
}

/* ✨ АНИМАЦИЯ СМЕНЫ ЯЗЫКА */
.fade {
    opacity: 0;
    transform: translateY(5px);
    transition: 0.25s;
}
.fade.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<div class="main-container">
<div class="card">

<img src="avatar.jpg" class="avatar">

<h1>kittyzayka</h1>

<div class="lang-switch">
<span onclick="setLang('ru')">RU</span> | 
<span onclick="setLang('en')">EN</span>
</div>

<div class="small fade" id="clock"></div>

<div class="small fade"
data-ru="🎮 Любимая игра: Resident Evil"
data-en="🎮 Favorite game: Resident Evil"></div>

<div class="projects-title fade"
data-ru="Мои проекты"
data-en="My Projects"></div>

<div class="small fade"
data-ru="Телеграм бот (~6 часов разработки)"
data-en="Telegram bot (~6 hours development)">
</div>

</div>
</div>

<script>
// 🌍 язык с анимацией
function setLang(lang) {
    localStorage.setItem("lang", lang);
    applyLang(true);
}

function applyLang(animated = false) {
    let lang = localStorage.getItem("lang") || "ru";

    document.querySelectorAll("[data-ru]").forEach(el => {

        if (animated) {
            el.classList.remove("show");
            el.classList.add("fade");

            setTimeout(() => {
                el.innerHTML = el.getAttribute("data-" + lang);
                el.classList.add("show");
            }, 150);

        } else {
            el.innerHTML = el.getAttribute("data-" + lang);
            el.classList.add("show");
        }

    });
}

applyLang();

// ⏰ часы
function updateClock() {
    let now = new Date();
    let utc = now.getTime() + now.getTimezoneOffset()*60000;
    let time = new Date(utc + 7*3600000);

    document.getElementById("clock").innerText =
        "Novosibirsk: " + time.toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
